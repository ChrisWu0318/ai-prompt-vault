function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function inline(s){return esc(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/`(.+?)`/g,"<code>$1</code>").replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');}
function md2html(md){const L=md.split("\n");let h="",i=0,inL=false,lt="";const cl=()=>{if(inL){h+="</"+lt+">";inL=false;}};
 while(i<L.length){let line=L[i];
  if(line.startsWith("```")){cl();let c="";i++;while(i<L.length&&!L[i].startsWith("```")){c+=L[i]+"\n";i++;}h+="<pre><code>"+esc(c)+"</code></pre>";i++;continue;}
  if(line.includes("|")&&i+1<L.length&&/^\s*\|?[\s:|-]+\|?\s*$/.test(L[i+1])&&L[i+1].includes("-")){cl();const hd=line.split("|").filter(c=>c.trim()!=="").map(c=>c.trim());i+=2;let rs=[];while(i<L.length&&L[i].includes("|")){rs.push(L[i].split("|").filter(c=>c.trim()!=="").map(c=>c.trim()));i++;}h+="<table><thead><tr>"+hd.map(x=>"<th>"+inline(x)+"</th>").join("")+"</tr></thead><tbody>"+rs.map(r=>"<tr>"+r.map(c=>"<td>"+inline(c)+"</td>").join("")+"</tr>").join("")+"</tbody></table>";continue;}
  let m=line.match(/^(#{1,6})\s+(.*)$/);if(m){cl();h+="<h"+m[1].length+">"+inline(m[2])+"</h"+m[1].length+">";i++;continue;}
  if(/^---+$/.test(line.trim())){cl();h+="<hr/>";i++;continue;}
  if(line.startsWith(">")){cl();let q="";while(i<L.length&&L[i].startsWith(">")){q+=L[i].replace(/^>\s?/,"")+"\n";i++;}h+="<blockquote>"+inline(q.trim()).replace(/\n/g,"<br/>")+"</blockquote>";continue;}
  let ul=line.match(/^\s*[-*]\s+(.*)$/),ol=line.match(/^\s*\d+\.\s+(.*)$/);
  if(ul){if(!inL||lt!=="ul"){cl();h+="<ul>";inL=true;lt="ul";}h+="<li>"+inline(ul[1])+"</li>";i++;continue;}
  if(ol){if(!inL||lt!=="ol"){cl();h+="<ol>";inL=true;lt="ol";}h+="<li>"+inline(ol[1])+"</li>";i++;continue;}
  if(line.trim()===""){cl();i++;continue;}
  cl();h+="<p>"+inline(line)+"</p>";i++;}
 cl();return h;}
const nav=document.getElementById("nav"),doc=document.getElementById("doc"),side=document.getElementById("side");
function buildNav(){let s="",last="";COURSE.forEach((d,idx)=>{if(d.sec!==last){s+='<div class="group">'+d.sec+'</div>';last=d.sec;}
  if(d.locked){s+='<a href="#" data-i="'+idx+'"><span>'+d.title+'</span><span class="lk">🔒</span></a>';}
  else{s+='<a href="#" class="free" data-i="'+idx+'"><span>'+d.title.replace("(免费试看)","")+'</span><span class="tag">免费</span></a>';}});
  nav.innerHTML=s;nav.querySelectorAll("a").forEach(a=>a.onclick=e=>{e.preventDefault();show(+a.dataset.i);side.classList.remove("open");});}
function show(i){const d=COURSE[i];
 if(d.locked){doc.innerHTML='<div class="lock"><div class="ic">🔒</div><h2>'+d.title+'</h2><p class="ts">'+d.teaser+'</p><a class="cta" href="'+SALES+'">🎓 报名解锁全部章节 →</a><div class="px"><b>¥499</b> 早鸟价 · 含8章讲义+30天计划+8套模板+陪跑社群</div></div>';}
 else{doc.innerHTML=md2html(d.md);}
 nav.querySelectorAll("a").forEach(a=>a.classList.toggle("on",+a.dataset.i===i));
 window.scrollTo(0,0);}
document.getElementById("menu").onclick=()=>side.classList.toggle("open");
buildNav();show(0);
</script></body></html>
